<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            /* background: linear-gradient(to bottom, black, blue); */
            background-image: url(../Tests/wallpaperflare.com_wallpaper\ \(29\).jpg);
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            color: white;
            font-family: cursive;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background-color: rgba(0, 0, 0, 0.5);
            /* dark gray */
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-bottom: 20px;

        }

        .image-upload {
            margin-bottom: 20px;
        }

        .circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: black;
            margin: 0 auto 10px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            border: 2px solid transparent;
            transition: all 0.5s;
        }

        * {
            font-family: cursive;
            color: white;
            /* box-sizing: border-box; */
        }

        .upload-label {
            display: block;
            color: white;
            cursor: pointer;
        }

        .upload-label.hidden {
            display: none;
        }

        .circle:hover,
        .circle:focus {
            border-color: rgb(0, 0, 0);
            width: 110px;
            height: 110px;
        }

        input[type="file"] {
            display: none;
        }

        .upload-label {
            display: block;
            color: white;
            cursor: pointer;
        }


        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            background-color: black;
            color: white;
            border: 1px solid transparent;
            border-radius: 20px;
            transition: all 1s;
        }

        input[type="text"]:hover,
        input[type="email"]:hover,
        input[type="password"]:hover {
            background-color: #333;
            outline: none;
            width: 85%;
        }


        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: rgb(65, 65, 65);
            background-color: #333;
            outline: none;
        }

        button[type="submit"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            background-color: #333;
            color: white;
            border: 1px solid transparent;
            border-radius: 200px;
            cursor: pointer;
            transition: all 0.5s;
        }

        button[type="submit"]:hover {
            background-color: rgb(10, 10, 105);
            width: 85%;

        }

        .password {
            text-decoration: none;
            color: rgb(255, 255, 255);
            transition: all 1s;
        }

        .password:hover {
            color: rgb(0, 0, 255);
            cursor: pointer;
            font-size: larger;
            font-weight: bolder;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Login now 🔐 </h1>
        <div class="image-upload">
            <div class="circle" id="profile-preview" onclick="document.getElementById('profile-image').click()"></div>
            <label for="profile-image" class="upload-label" id="upload-label">Choose Profile Image</label>
            <input type="file" id="profile-image" accept="image/*">
        </div>
        <form action="../Mobix/Mobix.html" target="_blank" method="post" novalidate>
            <input type="text" placeholder="Name" required minlength="5" maxlength="25">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required minlength="10" maxlength="25">
            <a href="../Mobix/pass2.html" class="password">Forgot Password ?</a>
            <button type="submit">Submit</button>
        </form>
    </div>
    <script>
        const fileInput = document.getElementById('profile-image');
        const preview = document.getElementById('profile-preview');
        const label = document.getElementById('upload-label');

        // Set initial image and hide label
        preview.style.backgroundImage = `url('imgs/icon-7797704_640.png')`;
        label.classList.add('hidden');

        fileInput.addEventListener('change', function (event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    preview.style.backgroundImage = `url(${e.target.result})`;
                    label.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>

</html>
