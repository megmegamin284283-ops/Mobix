<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I love you</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-image: url(../Tests/wallpaperflare.com_wallpaper\ \(14\).jpg);
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            color: white;
            font-family: cursive;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background-color: rgba(0, 0, 0, 0.5);
            /* dark gray */
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-bottom: 20px;

        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        * {
            font-family: cursive;
            font-weight: bold;
        }








        button[type="submit"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            background-color: #333;
            color: white;
            border: 1px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            transition: all 1s;
            font-size: medium;
        }

        button[type="submit"]:hover {
            background-color: rgb(255, 255, 0);
            color: black;
            width: 85%;
        }


        p {
            font-size: x-large;
        }
    </style>
</head>

<body>
    <div class="box">


        <form action="../Mobix/Mobix.html" method="post">
            <p>I Love You 🥰</p>
            <button type="submit">Home</button>
        </form>
    </div>
</body>

</html>
